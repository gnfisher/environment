# vim: set ft=tmux:

# Minimal tmux config: defaults + muscle-memory bindings only.

# Core behavior
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g status-keys emacs
set -g focus-events on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g mouse on

# Shell: fish on macOS/Linux when available.
if-shell "test -f /opt/homebrew/bin/fish" \
    "set-option -g default-shell /opt/homebrew/bin/fish" \
    "if-shell \"test -f /usr/local/bin/fish\" \
        \"set-option -g default-shell /usr/local/bin/fish\" \
        \"if-shell 'test -f /usr/bin/fish' \
            'set-option -g default-shell /usr/bin/fish'\""

# Prefix
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# Panes
unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind Enter split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r - resize-pane -D 2
bind -r = resize-pane -U 2
bind -r [ resize-pane -L 2
bind -r ] resize-pane -R 2
bind e run-shell 'tmux resize-pane -t "#{pane_id}" -x "$((#{window_width} * 2 / 3))"'
bind -r DC select-layout tiled
bind x kill-pane

# Windows
bind c new-window -c "#{pane_current_path}"
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Sessions
bind-key X run-shell 'tmux switch-client -n \; kill-session -t "#S"'

# Copy mode
set-window-option -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi Escape send-keys -X clear-selection
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# Reload
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded"
